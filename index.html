<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>후르츠 박스 - AWS 배포 실습</title>
  <style>
    /* 1. 기본 스타일 (수정 불필요) */
    body { 
      display: flex; justify-content: center; align-items: center; height: 100vh; 
      background-color: #2c3e50; margin: 0; font-family: 'Arial', sans-serif; 
      user-select: none; -webkit-user-select: none; touch-action: none;
    }
    .game-container { 
      position: relative; background-color: #ffffff; border: 15px solid #2ecc71; 
      border-radius: 20px; padding: 20px; width: 750px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
      overflow: hidden; 
    }
    .header { text-align: center; margin-bottom: 20px; }
    .title { color: #ff5e5e; font-size: 28px; font-weight: bold; margin: 0; text-shadow: 1px 1px 2px white; }
    .button-group { display: flex; gap: 15px; margin-top: 10px; justify-content: center; }
    button { 
      background: #e74c3c; border: none; color: white; padding: 10px 20px; 
      border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; 
    }
    button:hover { transform: scale(1.05); background-color: #c0392b; }
    .btn-secondary { background-color: #3498db !important; }

    /* 2. 게임 요소 스타일 */
    .score-board { display: flex; justify-content: space-between; align-items: center; background-color: #f8f9fa; padding: 10px; border-radius: 10px; margin-top: 10px; font-weight: bold; border: 1px solid #dee2e6; font-size: 16px; }
    #timer-display { color: #e74c3c; font-size: 20px; }
    #board-container { position: relative; min-height: 400px; }
    #board { display: grid; grid-template-columns: repeat(17, 1fr); gap: 4px; margin-bottom: 20px; justify-items: center; background-color: #f8f9fa; padding: 15px; border-radius: 10px; }
    #selection-box { position: absolute; border: 2px solid rgba(46, 204, 113, 0.8); background-color: rgba(46, 204, 113, 0.3); pointer-events: none; display: none; z-index: 10; }
    .apple { width: 32px; height: 32px; background: radial-gradient(circle at 30% 30%, #ff7675, #d63031); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 16px; font-weight: bold; color: white; cursor: pointer; position: relative; }
    .apple.selected { box-shadow: 0 0 0 3px #ffeaa7; transform: scale(1.1); z-index: 5; }
    .apple.cleared { visibility: hidden; }

    /* 3. 오버레이 화면 스타일 (매우 중요) */
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    #start-screen { display: flex; } /* 시작 시에만 보임 */
    #start-screen input { padding: 12px; font-size: 18px; border-radius: 10px; border: 2px solid #2ecc71; margin-bottom: 20px; text-align: center; width: 250px; }
    #ranking-screen { overflow-y: auto; text-align: center; }
    #ranking-list { width: 80%; margin: 20px 0; border-collapse: collapse; }
    #ranking-list th, #ranking-list td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
    #ranking-list th { background-color: #2ecc71; color: white; }
  </style>
</head>
<body>

<div class="game-container">
    <div id="start-screen" class="overlay">
        <h2 style="color: #2ecc71; font-size: 45px; margin-bottom: 10px;">후르츠 박스</h2>
        <input type="text" id="user-name-input" placeholder="이름을 입력하세요">
        <div class="button-group">
            <button onclick="startGame()">게임 시작</button>
            <button onclick="showRankings()" class="btn-secondary">랭킹 보기</button>
        </div>
    </div>

    <div id="ranking-screen" class="overlay">
        <h2 style="color: #3498db; font-size: 30px;">🏆 실시간 랭킹</h2>
        <table id="ranking-list">
            <thead>
                <tr><th>순위</th><th>이름</th><th>점수</th></tr>
            </thead>
            <tbody id="ranking-data"></tbody>
        </table>
        <button onclick="goToHome()">닫기</button>
    </div>

    <div id="game-over-screen" class="overlay">
        <h2 style="color: #e74c3c; font-size: 40px;">Time Over!</h2>
        <p>최종 점수: <span id="final-score">0</span>점</p>
        <div class="button-group">
            <button onclick="goToHome()">처음으로</button>
            <button class="btn-secondary" onclick="showRankings()">랭킹 보기</button>
        </div>
    </div>

    <div class="header">
        <h1 class="title">후르츠 박스</h1>
        <div class="score-board">
            <span>Score: <span id="score">0</span></span>
            <span id="timer-display">02:00</span>
            <span>현재 합: <strong id="current-sum">0</strong></span>
        </div>
    </div>
    <div id="board-container">
        <div id="selection-box"></div>
        <div id="board"></div>
    </div>
</div>

<script>
  // 로드 밸런서 주소
  const API_URL = 'http://git-data-1-1336195946.us-east-1.elb.amazonaws.com';

  let score = 0, userName = "", selectedApples = [], isDragging = false;
  let startX, startY, timeLeft = 120, timerInterval, isGameOver = false;

  const startScreen = document.getElementById('start-screen');
  const gameOverScreen = document.getElementById('game-over-screen');
  const rankingScreen = document.getElementById('ranking-screen');
  const boardContainer = document.getElementById('board-container');
  const selectionBox = document.getElementById('selection-box');
  const sumDisplay = document.getElementById('current-sum');
  const timerDisplay = document.getElementById('timer-display');

  function startGame() {
    const nameInput = document.getElementById('user-name-input');
    if (!nameInput.value.trim()) { alert("이름을 입력해주세요!"); return; }
    userName = nameInput.value;
    startScreen.style.display = 'none';
    initGame();
  }

  function initGame() {
    const board = document.getElementById('board');
    board.innerHTML = ''; score = 0; isGameOver = false;
    document.getElementById('score').textContent = score;
    updateSumDisplay(0);
    gameOverScreen.style.display = 'none';
    rankingScreen.style.display = 'none';

    clearInterval(timerInterval);
    timeLeft = 120;
    updateTimerDisplay();
    timerInterval = setInterval(() => { 
      timeLeft--; 
      updateTimerDisplay(); 
      if(timeLeft <= 0) endGame(); 
    }, 1000);

    // 10의 배수 보정 로직
    let totalSum = 0, nums = [];
    do {
      nums = []; totalSum = 0;
      for (let i = 0; i < 170; i++) {
        const n = Math.floor(Math.random() * 9) + 1;
        nums.push(n); totalSum += n;
      }
    } while (totalSum % 10 !== 0);

    nums.forEach(num => {
      const apple = document.createElement('div');
      apple.className = 'apple'; apple.textContent = num;
      apple.dataset.value = num; board.appendChild(apple);
    });
  }

  function updateTimerDisplay() {
    const min = Math.floor(timeLeft / 60), sec = timeLeft % 60;
    timerDisplay.textContent = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  }

  function endGame() {
    isGameOver = true; clearInterval(timerInterval);
    document.getElementById('final-score').textContent = score;
    gameOverScreen.style.display = 'flex'; 
    saveScore(userName, score);
  }

  function saveScore(name, score) {
    fetch(`${API_URL}/save-score`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: name, score: score })
    }).catch(err => console.error('저장 실패:', err));
  }

  // 핵심 수정: 모든 화면 전환을 관리합니다.
  function showRankings() {
    console.log("📢 랭킹 보기 버튼 클릭됨");
    
    // 다른 오버레이는 모두 숨기고 랭킹만 띄움
    startScreen.style.display = 'none';
    gameOverScreen.style.display = 'none';
    rankingScreen.style.display = 'flex';

    const tbody = document.getElementById('ranking-data');
    tbody.innerHTML = "<tr><td colspan='3'>로딩 중...</td></tr>";

    fetch(`${API_URL}/rankings`)
    .then(res => {
        if (!res.ok) throw new Error("네트워크 응답 없음");
        return res.json();
    })
    .then(data => {
      console.log("✅ 데이터 수신 성공:", data);
      tbody.innerHTML = "";
      if (data.length === 0) {
          tbody.innerHTML = "<tr><td colspan='3'>기록이 없습니다.</td></tr>";
          return;
      }
      data.forEach((row, index) => {
        tbody.innerHTML += `<tr><td>${index+1}</td><td>${row.username}</td><td>${row.score}</td></tr>`;
      });
    })
    .catch(err => { 
        console.error('❌ 로드 실패:', err);
        tbody.innerHTML = "<tr><td colspan='3'>데이터 로드 실패 (F12 확인)</td></tr>"; 
    });
  }

  function goToHome() { location.reload(); }

  function updateSumDisplay(sum) {
    sumDisplay.textContent = sum;
    sumDisplay.style.color = sum > 10 ? 'red' : (sum === 10 ? '#2ecc71' : 'black');
  }

  // 드래그 로직 (수정 불필요)
  boardContainer.addEventListener('pointerdown', (e) => {
    if (isGameOver) return; 
    isDragging = true;
    const rect = boardContainer.getBoundingClientRect();
    startX = e.clientX - rect.left; startY = e.clientY - rect.top;
    selectionBox.style.display = 'block';
    selectionBox.style.width = '0px'; selectionBox.style.height = '0px';
  });

  window.addEventListener('pointermove', (e) => {
    if (!isDragging || isGameOver) return;
    const rect = boardContainer.getBoundingClientRect();
    let curX = e.clientX - rect.left, curY = e.clientY - rect.top;
    selectionBox.style.left = Math.min(startX, curX) + 'px';
    selectionBox.style.top = Math.min(startY, curY) + 'px';
    selectionBox.style.width = Math.abs(curX - startX) + 'px';
    selectionBox.style.height = Math.abs(curY - startY) + 'px';
    checkCollisions();
  });

  window.addEventListener('pointerup', () => {
    if (!isDragging) return;
    isDragging = false; selectionBox.style.display = 'none';
    finalizeSelection();
  });

  function checkCollisions() {
    const boxRect = selectionBox.getBoundingClientRect();
    let currentSum = 0; selectedApples = [];
    document.querySelectorAll('.apple:not(.cleared)').forEach(apple => {
      const r = apple.getBoundingClientRect();
      if (!(boxRect.right < r.left || boxRect.left > r.right || boxRect.bottom < r.top || boxRect.top > r.bottom)) {
        apple.classList.add('selected'); selectedApples.push(apple);
        currentSum += parseInt(apple.dataset.value);
      } else { apple.classList.remove('selected'); }
    });
    updateSumDisplay(currentSum);
  }

  function finalizeSelection() {
    const sum = selectedApples.reduce((s, a) => s + parseInt(a.dataset.value), 0);
    if (sum === 10) {
      score += selectedApples.length;
      document.getElementById('score').textContent = score;
      selectedApples.forEach(a => a.classList.add('cleared'));
    }
    document.querySelectorAll('.apple').forEach(a => a.classList.remove('selected'));
    updateSumDisplay(0);
  }
</script>
</body>
</html>
